version: '3.8'

services:
  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diceforge-backend
    ports:
      - "3000:3000"
    volumes:
      # Persister la base de données SQLite
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - diceforge-network
  
  # Frontend Expo Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_BACKEND_URL: ${EXPO_PUBLIC_BACKEND_URL:-http://localhost:3000}
    container_name: diceforge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - diceforge-network

networks:
  diceforge-network:
    driver: bridge

volumes:
  # Volume pour persister la base de données
  backend-data:
    driver: local
